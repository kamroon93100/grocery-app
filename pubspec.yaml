name: grocery_local
description: Complete Grocery Store App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http:               ^1.2.0
  provider:           ^6.1.2
  shared_preferences: ^2.3.2
  sqflite:            ^2.3.3
  path:               ^1.9.0
  crypto:             ^3.0.3
  cupertino_icons:    ^1.0.8
  shimmer:            ^3.0.0
  url_launcher:       ^6.3.0
  flutter_local_notifications: ^17.2.3
  pdf:                ^3.11.1
  printing:           ^5.13.4
  share_plus:         ^10.1.2
  path_provider:      ^2.1.5
  cached_network_image: ^3.4.1
  image_picker:       ^1.1.2
  geolocator:         ^11.0.0
  permission_handler: ^11.3.1
  carousel_slider:    ^5.0.0
  smooth_page_indicator: ^1.2.0
  google_fonts:       ^6.2.1
  intl:               ^0.19.0
  uuid:               ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_foreground_inset: 16
