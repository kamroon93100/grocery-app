name: grocery_local
description: Complete Grocery Store App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http:               ^1.2.0

  # State Management
  provider:           ^6.1.2

  # Local Storage
  shared_preferences: ^2.3.2

  # Database
  sqflite:            ^2.3.3
  path:               ^1.9.0

  # Security
  crypto:             ^3.0.3

  # UI
  cupertino_icons:    ^1.0.8
  shimmer:            ^3.0.0

  # WhatsApp + Links
  url_launcher:       ^6.3.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # PDF Generation
  pdf:                ^3.11.1
  printing:           ^5.13.4
  share_plus:         ^10.1.2
  path_provider:      ^2.1.5

  # Utils
  intl:               ^0.19.0
  uuid:               ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
